{% extends "base.html" %}

{% block title %}Bank Reconciliation{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-th-dark-blue">Bank Reconciliation</h1>
            <p class="text-th-gray-blue mt-1">Manage bank statement reconciliations</p>
        </div>
        <a href="{{ url_for('bank_rec.upload') }}" 
           class="inline-flex items-center gap-2 px-4 py-2 bg-th-azure text-white rounded-lg hover:bg-th-azure-dark transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            New Reconciliation
        </a>
    </div>
    
    <!-- Placeholder content -->
    <div class="bg-white rounded-xl shadow-th-sm border border-slate-200 p-8 text-center">
        <div class="text-th-gray-blue">
            <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p class="text-lg font-medium">No reconciliation periods yet</p>
            <p class="mt-2">Upload bank statements and Yardi reports to get started</p>
        </div>
    </div>
</div>
{% endblock %}
