{% extends "base.html" %}

{% block title %}Upload Files - Bank Reconciliation{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div>
        <h1 class="text-2xl font-bold text-th-dark-blue">Upload Files</h1>
        <p class="text-th-gray-blue mt-1">Upload bank statements (PDF) and Yardi reports (Excel)</p>
    </div>
    
    <!-- Upload form placeholder -->
    <div class="bg-white rounded-xl shadow-th-sm border border-slate-200 p-8">
        <div class="text-center text-th-gray-blue">
            <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-lg font-medium">Upload functionality will be migrated</p>
            <p class="mt-2">This page will support Google Drive file selection</p>
        </div>
    </div>
</div>
{% endblock %}
